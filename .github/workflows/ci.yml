name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Verify generated layer is in sync with the spec
        run: |
          npm run generate
          git diff --exit-code src/generated src/resources \
            || (echo "::error::Generated code is out of sync. Run 'npm run generate' and commit." && exit 1)
      - name: Verify SDK_VERSION is in sync with package.json
        run: npm run version:check
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
