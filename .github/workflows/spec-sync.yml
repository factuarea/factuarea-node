name: Spec Sync

# Receiver side of the cross-repo spec flow (design D10).
#
# The single source of truth for the public OpenAPI spec lives in the private
# `factuarea` repo and is published at a stable URL. This workflow keeps the
# pinned copy in `spec/openapi.json` (and the generated layer) up to date:
#
#   • repository_dispatch (event_type: spec-updated) — pushed by the `factuarea`
#     CI when the spec changes (emitter NOT yet wired — needs an org PAT; the
#     ready-to-paste snippet is in docs/SPEC_SYNC.md).
#   • workflow_dispatch — manual trigger.
#   • schedule (daily) — fallback if the dispatch never arrives.
#
# When the published spec differs CANONICALLY from the committed copy (parsed
# JSON, key-order/whitespace-insensitive — see scripts/spec-sync.mjs) the spec
# is updated, the SDK is regenerated, and a PR is opened with an auto changeset.
# It NEVER pushes to main directly — a human reviews and merges, which triggers
# the Release workflow.

on:
  repository_dispatch:
    types: [spec-updated]
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC

permissions:
  contents: write # create the sync branch
  pull-requests: write # open the sync PR

env:
  # The published spec URL is FIXED to the official endpoint and is NOT
  # overridable from the event payload. A repository_dispatch is only a "go
  # regenerate" signal; allowing client_payload.spec_url to set the URL would
  # let any dispatch point CI at an attacker-controlled spec that is then
  # downloaded, regenerated into code, and executed (RCE in CI).
  SPEC_URL: "https://docs.factuarea.com/api/openapi"

jobs:
  sync:
    name: Sync spec & regenerate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download published spec
        run: |
          echo "Fetching spec from $SPEC_URL"
          curl -fsSL "$SPEC_URL" -o /tmp/published-spec.json
          # Fail early if the URL returned something that is not JSON.
          node -e "JSON.parse(require('fs').readFileSync('/tmp/published-spec.json','utf8'))" \
            || (echo "::error::Published spec at $SPEC_URL is not valid JSON." && exit 1)

      - name: Canonically compare published vs committed spec
        id: diff
        run: node scripts/spec-sync.mjs check /tmp/published-spec.json

      - name: No change — nothing to do
        if: steps.diff.outputs.changed != 'true'
        run: echo "Published spec matches the committed copy (canonical). Nothing to sync."

      - name: Apply new spec & regenerate
        if: steps.diff.outputs.changed == 'true'
        run: |
          node scripts/spec-sync.mjs apply /tmp/published-spec.json
          npm run generate
          npm run typecheck
          npm run build
          npm test

      - name: Write changeset
        if: steps.diff.outputs.changed == 'true'
        run: |
          mkdir -p .changeset
          BUMP="${{ steps.diff.outputs.bump }}"
          ADDED="${{ steps.diff.outputs.added_ops }}"
          REMOVED="${{ steps.diff.outputs.removed_ops }}"
          cat > .changeset/spec-sync.md <<EOF
          ---
          "@factuarea/sdk": ${BUMP}
          ---

          Regenerate the SDK from an updated public OpenAPI spec
          (+${ADDED} operations, -${REMOVED} operations).

          > Auto-generated by the Spec Sync workflow. Review the diff and, if it
          > includes a breaking change (e.g. a removed/renamed operation), bump
          > this changeset to \`major\` before merging.
          EOF
          echo "Wrote .changeset/spec-sync.md (${BUMP})"

      - name: Open sync PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: spec-sync/update
          base: main
          commit-message: "chore(spec): sync OpenAPI spec & regenerate"
          title: "chore(spec): sync OpenAPI spec & regenerate (+${{ steps.diff.outputs.added_ops }}/-${{ steps.diff.outputs.removed_ops }} ops)"
          labels: spec-sync
          body: |
            The published OpenAPI spec changed; this PR re-pins
            `spec/openapi.json` and regenerates `src/generated/` and
            `src/resources/`.

            - Added operations: **${{ steps.diff.outputs.added_ops }}**
            - Removed operations: **${{ steps.diff.outputs.removed_ops }}**
            - Proposed bump: **${{ steps.diff.outputs.bump }}** (see the changeset)

            Review the diff. If it contains a breaking change, edit
            `.changeset/spec-sync.md` to `major` before merging. Merging this PR
            feeds the Changesets release flow (see the Release workflow).
          author: "Factuarea <info@factuarea.com>"
          committer: "Factuarea <info@factuarea.com>"
