name: Release

# Release pipeline for @factuarea/sdk.
#
# Flow (Changesets + npm Trusted Publishing):
#   1. PRs to main carry a changeset (.changeset/*.md) describing the bump.
#   2. On merge to main, changesets/action opens/updates the "Version Packages"
#      PR: it applies the bumps, rewrites CHANGELOG.md and package.json, and
#      keeps SDK_VERSION + the lockfile in sync (via `npm run version`).
#   3. Merging THAT PR makes the changeset files disappear, so this workflow
#      publishes to npm via OIDC Trusted Publishing (no long-lived NPM_TOKEN)
#      with build provenance.
#
# Trusted Publisher setup is a one-time manual step on npmjs.com — see
# docs/RELEASING.md. Until it exists, the publish step fails with a clear error.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # changesets/action needs to push the Version PR + create tags
  pull-requests: write # ... and to open/update the Version PR
  id-token: write # OIDC token for npm Trusted Publishing + provenance attestation

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changesets needs full history for changelog links

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) requires npm >= 11.5.1. setup-node ships an
      # older npm, so pin a known-good version explicitly.
      - name: Ensure npm supports Trusted Publishing (OIDC)
        run: npm install -g npm@^11.5.1

      - run: npm ci

      # Regenerated layer must match the committed spec (same gate as CI).
      - name: Verify generated layer is in sync with the spec
        run: |
          npm run generate
          git diff --exit-code src/generated src/resources \
            || (echo "::error::Generated code is out of sync. Run 'npm run generate' and commit." && exit 1)

      - name: Verify SDK_VERSION is in sync with package.json
        run: npm run version:check

      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1.9.0
        with:
          # `version` applies the bumps + changelog; `publish` runs once the
          # Version PR is merged and the changeset files are gone.
          version: npm run version
          publish: npm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NO NPM_TOKEN: publishing authenticates via OIDC Trusted Publishing.
          # `npm publish` (invoked by `changeset publish`) picks up the OIDC
          # token automatically when `id-token: write` is granted and the
          # package has a Trusted Publisher configured on npmjs.com. If it is
          # NOT configured, the publish fails with npm's own auth error — see
          # docs/RELEASING.md for the one-time setup.
          NPM_CONFIG_PROVENANCE: "true"

      - name: Explain a failed publish
        if: failure() && steps.changesets.outputs.published != 'true'
        run: |
          echo "::error::Release step failed. If this was the publish (the"
          echo "::error::Version PR was just merged), the most likely cause is"
          echo "::error::a missing npm Trusted Publisher for @factuarea/sdk."
          echo "::error::Configure it once on npmjs.com — see docs/RELEASING.md"
          echo "::error::(owner: factuarea, repo: factuarea-node, workflow: release.yml)."
